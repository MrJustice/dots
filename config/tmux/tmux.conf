# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse mode
set -g mouse on
setw -g mode-keys vi

# Let nvim detect terminal focus changes inside tmux
set -g focus-events on

# Set windows numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically set window title
set-option -g set-titles on
set-option -g automatic-rename on

# Split panes using | and -
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Windows navigation
# unbind n
# unbind p
# bind -r C-l next-window     # next window
# bind -r C-h previous-window # previous window

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-h resize-pane -L
bind-key M-l resize-pane -R

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# copy to system clipboard (xclip required)
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"

# No delay for escape key press
set -sg escape-time 0

# Reload tmux config
unbind r
bind r \
    source-file ~/.config/tmux/tmux.conf \;\
    display 'Reload tmux config'

######################
##### STATUSLINE #####
######################

set-option -g status on
set-option -g status-interval 1
set-option -g status-justify left
set-option -g status-position top
set-option -g status-style bg=default,fg=white

set-option -g status-left-length 30
set-option -g status-left '[#{session_name}]#(echo "  ")'

set-option -g status-right-length 150
set-option -g status-right ''
# set-option -g status-right '%a %I:%M %d-%m-%Y'

set-option -g window-status-format '#{window_index}#(echo ":")[#{window_name}]#{window_flags}'
set-option -g window-status-current-format '#[bold]#{window_index}#(echo ":")[#{window_name}]#{window_flags}'

######################
### DESIGN CHANGES ###
######################

# colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# loud or quiet?
set -g visual-bell off
set -g bell-action none
set -g visual-silence off
set -g visual-activity off
setw -g monitor-activity off
